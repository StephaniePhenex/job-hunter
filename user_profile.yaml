# ============================================================
# user_profile.yaml — Personalize your job search here.
# Edit this file to match your own interests and target roles.
# ============================================================

# ------------------------------------------------------------
# Profile: sent to the LLM when scoring each job.
# The LLM uses this to rate how well a job matches YOU.
# ------------------------------------------------------------
profile:
  location_focus: "Canada"          # Geographic preference
  term: "Fall 2026 internship"      # Internship term you're targeting
  interests:
    - "Web3 / blockchain"
    - "AI products and tooling"
    - "Full-stack software engineering"
    - "Media / content technology"
    - "Creative tech and developer tools"

# ------------------------------------------------------------
# Keywords: control which jobs pass the pre-LLM filter.
# Only jobs matching at least ONE group reach LLM scoring.
# Priority is based on how many groups match (1=LOW, 2-3=MEDIUM, 4+=HIGH).
#
# Each group has:
#   label  — display name (shown as tag in the UI)
#   terms  — list of plain-text phrases (case-insensitive substring match)
#   regex  — (optional) raw regex for advanced patterns; overrides `terms`
# ------------------------------------------------------------
keywords:
  - label: "Software engineer"
    terms:
      - "software engineer"

  - label: "Full-stack engineer"
    terms:
      - "full-stack engineer"
      - "fullstack engineer"
      - "full stack engineer"

  - label: "Full-stack AI/SaaS"
    regex: >-
      full[\s-]*stack.{0,80}(ai|saas|sa\s*a\s*s)|\(ai\s*/\s*saas\)|
      (ai|saas).{0,50}full[\s-]*stack|full[\s-]*stack\s+engineer.{0,60}(ai|saas)

  - label: "AI builder"
    terms:
      - "ai builder"
      - "artificial intelligence builder"

  - label: "Product engineer"
    terms:
      - "product engineer"

  - label: "Product builder"
    terms:
      - "product builder"

  - label: "Creator tools"
    terms:
      - "creator tools"

  - label: "Web3"
    terms:
      - "web3"

  - label: "Web3 full-stack"
    regex: >-
      web3.{0,80}full[\s-]*stack|full[\s-]*stack.{0,80}web3

  - label: "DevRel"
    terms:
      - "devrel"
      - "developer relations"

  - label: "UX engineer"
    terms:
      - "ux engineer"
      - "u.x. engineer"

  - label: "Front-end / UI"
    terms:
      - "front-end engineer"
      - "frontend engineer"
      - "frontend developer"

  - label: "MLOps / AI implementation"
    terms:
      - "mlops"
      - "ml ops"
      - "ai implementation engineer"

  - label: "Technical Content Engineer"
    terms:
      - "technical content engineer"

  - label: "Creative technologist"
    terms:
      - "creative technologist"

  - label: "Media engineer"
    terms:
      - "media engineer"

  - label: "Architect (media)"
    regex: >-
      solution\s*architect.{0,120}(media|entertainment)|
      (media\s*&\s*entertainment|media\s+and\s+entertainment).{0,80}solution\s*architect

  - label: "Digital assets"
    regex: >-
      digital\s*assets?\s*develop\w*|develop\w*.{0,30}digital\s*assets?

  - label: "Animation / VFX (games)"
    regex: >-
      \bvfx\b|
      \banimation\b.{0,70}(games?|intern|studio|sledgehammer)|
      sledgehammer\s+games|
      intern(ship)?.{0,30}\b(vfx|animation)\b|\b(vfx|animation)\b.{0,40}intern

  - label: "Digital marketing / Journalism"
    regex: >-
      journalism\s+and\s+digital\s+marketing|
      \bdigital\s+marketing\b.{0,100}\bintern(ship)?\b|
      \bintern(ship)?.{0,100}\bdigital\s+marketing\b|
      marketing,\s*rpm\s+internship

  - label: "Electrical engineering"
    regex: >-
      \belectrical\s+engineering\b.{0,50}\bintern(ship)?\b|
      \bintern(ship)?.{0,50}\belectrical\s+engineering\b
